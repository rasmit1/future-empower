baseURL = "https://www.futureempowered.com/"
languageCode = "en-us"
title = "Future Empowered"
theme = "PaperMod"

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false
pygmentsUseClasses = true

[minify]
  disableXML = true

[pagination]
  pagerSize = 10

[outputs]
  home = ["HTML", "RSS", "JSON"]

# ── Main navigation ──
[menu]
  [[menu.main]]
    name = "Takes"
    pageRef = "/takes"
    weight = 10
  [[menu.main]]
    name = "Playbooks"
    pageRef = "/playbooks"
    weight = 20
  [[menu.main]]
    name = "Field Guides"
    pageRef = "/field-guides"
    weight = 30
  [[menu.main]]
    name = "Tools"
    pageRef = "/tools"
    weight = 40
  [[menu.main]]
    name = "About"
    pageRef = "/about"
    weight = 50
  [[menu.main]]
    name = "Work with me"
    pageRef = "/work-with-me"
    weight = 60

# ── Site parameters ──
[params]
  env = "production"
  title = "Future Empowered"
  description = "Future Empowered helps organizations design and build the systems of tomorrow — integrating strategy, technology, AI, operations, and control into a unified transformation engine that empowers people and accelerates performance."
  author = "Rashmi Mittal"
  defaultTheme = "light"
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = false
  ShowWordCount = false
  ShowToc = true
  TocOpen = false
  comments = false
  hidemeta = false
  hideSummary = false
  showtoc = true
  tocopen = false

  # Brand tagline — used in nav subtitle and footer
  brandTagline = "Enabled today. Empowered for tomorrow."

  # Home page hero
  [params.homeInfoParams]
    Title = "Rashmi Mittal"
    Content = "Future Empowered helps organizations design and build the systems of tomorrow — integrating strategy, technology, AI, operations, and control into a unified transformation engine that empowers people and accelerates performance."

  [params.assets]
    disableHLJS = true
    favicon = "/images/favicon.svg"
    favicon16x16 = "/images/favicon.svg"
    favicon32x32 = "/images/favicon.svg"
    apple_touch_icon = "/images/favicon.svg"

  [params.socialIcons]
    [[params.socialIcons]]
      name = "linkedin"
      url = "https://linkedin.com/in/yourprofile"

  [params.cover]
    hidden = false
    hiddenInList = false
    hiddenInSingle = false

[taxonomies]
  category = "categories"
  tag = "tags"
  series = "series"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false
